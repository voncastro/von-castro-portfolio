<?xml version="1.0" encoding="UTF-8"?>
<!--
  dvup app icon source — 1024×1024 canvas.
  Background: #06060F (brand bg).
  Mark centered at ~72% of tile.
  Rendered to PNG via scripts/generate_brand_assets.sh for iOS/Android/Flutter.

  Do NOT add rounded corners here — iOS applies masking; Android clips to adaptive shape.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="orb-grad-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8A8DEB"/>
      <stop offset="100%" stop-color="#D787A8"/>
    </linearGradient>
    <radialGradient id="core-radial-warm-a" cx="0.78" cy="0.55" r="0.65">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#A855F7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="inner-clip-a">
      <path d="M65,22 L108,47 L108,83 L65,108 L22,83 L22,47 Z"/>
    </clipPath>
    <clipPath id="mark-right-a">
      <rect x="67.5" y="0" width="65" height="130"/>
    </clipPath>
    <clipPath id="mark-left-a">
      <rect x="0" y="0" width="62.5" height="130"/>
    </clipPath>
  </defs>

  <!-- Solid brand-dark background -->
  <rect x="0" y="0" width="1024" height="1024" fill="#06060F"/>

  <!--
    Mark: the natural viewBox is (-15,-15) to (145,145) = 160×160 units.
    We scale to 925px (90% of 1024) and center: translate((1024-925)/2, ...) = (49.5).
    Scale factor: 925/160 = 5.78125. (25% larger than the original 72% version.)
  -->
  <g transform="translate(49.5 49.5) scale(5.78125) translate(15 15)">
    <rect x="22" y="22" width="86" height="86" fill="url(#core-radial-warm-a)" clip-path="url(#inner-clip-a)"/>
    <path d="M65,22 L108,47 L108,83 L65,108 L22,83 L22,47 Z"
          fill="none" stroke="rgba(138,141,235,0.32)" stroke-width="1" stroke-linejoin="round"/>
    <path d="M65,8 L119,37 L119,93 L65,122 L11,93 L11,37 Z"
          fill="rgba(138,141,235,0.1)" clip-path="url(#mark-right-a)"/>
    <path d="M65,8 L11,37 L11,93 L65,122"
          stroke="url(#orb-grad-a)" stroke-width="5" fill="none"
          stroke-linejoin="round" stroke-linecap="round"
          clip-path="url(#mark-left-a)" opacity="0.62"/>
    <path d="M65,8 L119,37 L119,93 L65,122"
          stroke="url(#orb-grad-a)" stroke-width="5" fill="none"
          stroke-linejoin="round" stroke-linecap="round"
          clip-path="url(#mark-right-a)"/>
    <path d="M37,38 C38,41 62,87 65,93 L65,88 C62,78 53,50 46,38 Z"
          fill="url(#orb-grad-a)" opacity="0.65"/>
    <path d="M93,38 C92,41 68,87 65,93 L65,88 C68,78 77,50 84,38 C87,36 90,37 93,38 Z"
          fill="url(#orb-grad-a)"/>
  </g>
</svg>
